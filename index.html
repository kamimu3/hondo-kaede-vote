document.querySelectorAll('.search-input').forEach(input => {
    const box = input.nextElementSibling;

    function renderList(list) {
        box.innerHTML = '';
        list.forEach(song => {
            const item = document.createElement('div');
            item.className = 'custom-select-item';
            item.textContent = song;
            
            const selectAction = function(e) {
                e.preventDefault();
                e.stopPropagation();
                input.value = song;
                box.style.display = 'none';
            };
            
            item.addEventListener('mousedown', selectAction);
            item.addEventListener('touchstart', selectAction);
            box.appendChild(item);
        });
    }

    const openBox = function(e) {
        document.querySelectorAll('.custom-select-box').forEach(b => b.style.display = 'none');
        renderList(songList);
        box.style.display = 'block';
    };

    input.addEventListener('click', openBox);
    input.addEventListener('focus', openBox);

    input.addEventListener('input', function() {
        const val = this.value.trim().toLowerCase();
        if (!val) {
            renderList(songList);
            return;
        }
        const filtered = songList.filter(song => song.toLowerCase().includes(val));
        renderList(filtered);
        box.style.display = 'block';
    });
});

document.addEventListener('click', function(e) {
    if (!e.target.classList.contains('search-input')) {
        document.querySelectorAll('.custom-select-box').forEach(box => {
            box.style.display = 'none';
        });
    }
});

            e.preventDefault();
            return false;
        }
    }
});

                  + "4位： " + r4 + "\n"
                  + "5位： " + r5 + "\n\n"
                  + "https://kamimu3.github.io/hondo-kaede-vote/";

    const tweetUrl = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(tweetText);
    document.getElementById('tweetBtn').href = tweetUrl;

    // 2. ユーザーがボタンを押した直後の判定を残したまま、最前面の新しいタブでX（Twitter）を開く
    // これによりブラウザのポップアップブロックを完全に無効化して最前面化させる
    window.open(tweetUrl, '_blank');

    // 3. Xを開いた直後、裏側（バックグラウンド）でGoogleフォームへデータを非同期送信（Fetch通信）
    const formData = new FormData(document.getElementById('voteForm'));
    fetch(document.getElementById('voteForm').action, {
        method: 'POST',
        body: formData,
        mode: 'no-cors' // Googleフォーム特有のクロスドメイン制限をすり抜ける設定
    }).then(() => {
        // 4. データ送信が完了したら、元の投票サイトを完了画面へ静かに切り替える
        document.getElementById('voteForm').style.display = 'none';
        document.getElementById('shareSection').style.display = 'block';
    }).catch((err) => {
        // 万が一ネットワークエラーが発生した場合の保険処理
        document.getElementById('voteForm').submit();
    });
}
</script>

</body>
</html>
