            max-width: 650px;

            border: 1px solid #cbd5e0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: inherit;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.5);
        }
        textarea {

            min-height: 80px;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3182ce;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background-color: #2b6cb0;
        }
        
        .share-section {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background-color: #f0fff4;
            border: 1px solid #c6f6d5;
            border-radius: 6px;
            text-align: center;
        }
        .share-section h2 {

            font-size: 20px;
            margin-top: 0;
            margin-bottom: 10px;
        }
        .share-section p {
            font-size: 14px;
            color: #2f855a;
            margin-bottom: 15px;
        }

            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s;
        }
        .twitter-btn:hover {

<script>
// 1. 検索中のEnterキーによる誤送信を防止する処理
document.getElementById('voteForm').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.keyCode === 13) {
        if (e.target.type !== 'submit' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault();
            return false;
        }
    }
});

// 2. 送信ボタンが押された時の処理（送信データを保護しつつ確実に画面を切り替える）
function handleFormSubmit() {
    // ブラウザに送信処理を走らせる時間をほんの少し（0.3秒）だけ与えてから画面を切り替える
    setTimeout(function() {
        document.getElementById('voteForm').style.display = 'none';
        document.getElementById('shareSection').style.display = 'block';
        createTweetLink();
    }, 300);
}

// 3. 曲名データを拾ってツイートリンクを作る処理
function createTweetLink() {
    const r1 = document.getElementById('rank1').value || "（未選択）";
    const r2 = document.getElementById('rank2').value || "（未選択）";
    const r3 = document.getElementById('rank3').value || "（未選択）";
    const r4 = document.getElementById('rank4').value || "（未選択）";
    const r5 = document.getElementById('rank5').value || "（未選択）";

    let tweetText = "「本渡さん キャラソン人気投票」に投票しました！\n\n"
                  + "1位： " + r1 + "\n"
                  + "2位： " + r2 + "\n"
                  + "3位： " + r3 + "\n"
                  + "4位： " + r4 + "\n"
                  + "5位： " + r5 + "\n\n"
                  + "https://kamimu3.github.io/hondo-kaede-vote/";

    const tweetUrl = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(tweetText);
    document.getElementById('tweetBtn').href = tweetUrl;
}
</script>
